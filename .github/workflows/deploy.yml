name: Deploy

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      skip_frontend:
        description: "Skip frontend deploy"
        type: boolean
        default: false
      skip_backend:
        description: "Skip backend deploy"
        type: boolean
        default: false

jobs:
  build-tokens:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @shockstack/tokens build
      - uses: actions/upload-artifact@v7
        with:
          name: token-dist
          path: packages/tokens/dist/

  deploy-frontend:
    needs: build-tokens
    if: ${{ !inputs.skip_frontend }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: actions/download-artifact@v8
        with:
          name: token-dist
          path: packages/tokens/dist/
      - run: pnpm --filter frontend build
      - run: pnpm --filter frontend exec wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  deploy-backend:
    needs: build-tokens
    if: ${{ !inputs.skip_backend }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/backend:latest
            ghcr.io/${{ github.repository }}/backend:${{ github.event.release.tag_name || github.sha }}
